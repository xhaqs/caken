<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>caKen Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --cocoa:#2B1810;
  --cocoa-light:#4A2C1D;
  --pink:#E8447A;
  --pink-deep:#C22960;
  --blush:#F5C6D6;
  --cream:#FBF0E4;
  --gold:#C9A66B;
  --border:rgba(251,240,228,0.12);
  --green:#4ADE80;
  --amber:#FBBF24;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--cocoa);
  color:var(--cream);
  font-family:'Work Sans',sans-serif;
  min-height:100vh;
}
.display{font-family:'Cormorant Garamond',serif}
.mono{font-family:'IBM Plex Mono',monospace}

/* ── PIN GATE ── */
#pinGate{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
}
#pinGate .display{font-size:32px;font-weight:700;margin-bottom:6px}
#pinGate .sub{font-size:12px;color:rgba(251,240,228,0.5);margin-bottom:24px}
#pinInput{
  width:200px;
  text-align:center;
  font-size:24px;
  letter-spacing:0.3em;
  background:var(--cocoa-light);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
  color:var(--cream);
  outline:none;
  margin-bottom:14px;
}
.btn{
  padding:13px 24px;
  border-radius:100px;
  border:none;
  font-family:'Work Sans',sans-serif;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
}
.btn-primary{background:var(--pink);color:var(--cream)}

/* ── DASHBOARD ── */
#dash{display:none}
header{
  padding:18px 20px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700}
.logo .accent{color:var(--pink)}

.stats-row{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  padding:16px 20px;
}
.stat-card{
  background:var(--cocoa-light);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px 10px;
  text-align:center;
}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--pink)}
.stat-label{font-size:9px;color:rgba(251,240,228,0.5);text-transform:uppercase;letter-spacing:0.05em;margin-top:2px}

.tabs{display:flex;gap:6px;padding:0 20px 12px}
.tab{
  padding:8px 14px;
  border-radius:100px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--cream);
  font-size:12px;
  cursor:pointer;
}
.tab.active{background:var(--pink);border-color:var(--pink);font-weight:600}

.section{padding:0 20px 32px;display:none}
.section.active{display:block}

.order-card{
  background:var(--cocoa-light);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  margin-bottom:10px;
}
.order-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.order-no{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--gold)}
.order-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;margin-top:2px}
.status-badge{
  font-size:9px;
  padding:4px 10px;
  border-radius:100px;
  font-family:'IBM Plex Mono',monospace;
  text-transform:uppercase;
  white-space:nowrap;
}
.status-pending{background:rgba(251,191,36,0.15);color:var(--amber)}
.status-confirmed{background:rgba(232,68,122,0.15);color:var(--pink)}
.status-baking{background:rgba(201,166,107,0.15);color:var(--gold)}
.status-ready{background:rgba(74,222,128,0.15);color:var(--green)}
.status-delivered{background:rgba(251,240,228,0.1);color:rgba(251,240,228,0.6)}

.order-detail{font-size:12px;color:rgba(251,240,228,0.7);line-height:1.6;margin-bottom:10px}
.order-detail b{color:var(--cream)}
.status-select{
  width:100%;
  background:rgba(251,240,228,0.05);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px;
  color:var(--cream);
  font-size:12px;
  font-family:'Work Sans',sans-serif;
}

.gallery-upload{
  background:var(--cocoa-light);
  border:1px dashed var(--border);
  border-radius:14px;
  padding:20px;
  text-align:center;
  margin-bottom:14px;
  cursor:pointer;
}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.gallery-item{
  aspect-ratio:1;
  border-radius:10px;
  overflow:hidden;
  position:relative;
  background:var(--cocoa-light);
}
.gallery-item img{width:100%;height:100%;object-fit:cover}
.gallery-item button{
  position:absolute;top:4px;right:4px;
  background:rgba(0,0,0,0.6);border:none;color:#fff;
  width:22px;height:22px;border-radius:50%;font-size:11px;cursor:pointer;
}

.empty-state{
  text-align:center;
  padding:30px 16px;
  color:rgba(251,240,228,0.4);
  font-size:12px;
}

#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  padding:12px 22px;border-radius:100px;font-size:13px;
  background:var(--cream);color:var(--cocoa);
  font-family:'Work Sans',sans-serif;font-weight:600;
  display:none;z-index:9999;
}
</style>
</head>
<body>

<div id="pinGate">
  <div class="display">ca<span style="color:var(--pink)">Ken</span></div>
  <div class="sub">Business Dashboard — Enter PIN</div>
  <input type="password" id="pinInput" inputmode="numeric" maxlength="4" placeholder="••••">
  <button class="btn btn-primary" onclick="checkPin()">Enter</button>
</div>

<div id="dash">
  <header>
    <div class="logo">ca<span class="accent">Ken</span> Dashboard</div>
    <button onclick="loadOrders()" style="background:none;border:1px solid var(--border);color:var(--cream);border-radius:8px;padding:8px 12px;font-size:11px;cursor:pointer">🔄</button>
  </header>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total Orders</div></div>
    <div class="stat-card"><div class="stat-num" id="statPending">0</div><div class="stat-label">Pending</div></div>
    <div class="stat-card"><div class="stat-num" id="statWeek">0</div><div class="stat-label">This Week</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchDashTab('orders', this)">📋 Orders</button>
    <button class="tab" onclick="switchDashTab('gallery', this)">🖼 Gallery</button>
  </div>

  <div class="section active" id="sec-orders">
    <div id="ordersList"><div class="empty-state">Loading orders...</div></div>
  </div>

  <div class="section" id="sec-gallery">
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button onclick="document.getElementById('galleryCameraInput').click()" style="flex:1;background:var(--cocoa-light);border:1px dashed var(--border);border-radius:14px;padding:16px;color:var(--cream);cursor:pointer;font-size:12px">📷<br>Take Photo</button>
      <button onclick="document.getElementById('galleryFileInput').click()" style="flex:1;background:var(--cocoa-light);border:1px dashed var(--border);border-radius:14px;padding:16px;color:var(--cream);cursor:pointer;font-size:12px">🖼<br>Choose from Gallery</button>
    </div>
    <input type="file" id="galleryCameraInput" accept="image/*" capture="environment" style="display:none" onchange="uploadGalleryPhoto(event)">
    <input type="file" id="galleryFileInput" accept="image/*" style="display:none" onchange="uploadGalleryPhoto(event)">
    <div class="gallery-grid" id="galleryGridDash"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const CORRECT_PIN = '4321'; // Change this before showing Ken!
let _orders = {};
let _gallery = {};

function toast(msg, dur=3000){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(()=>el.style.display='none', dur);
}

function checkPin(){
  const val = document.getElementById('pinInput').value;
  if(val === CORRECT_PIN){
    document.getElementById('pinGate').style.display = 'none';
    document.getElementById('dash').style.display = 'block';
    loadOrders();
    loadGallery();
  } else {
    toast('Incorrect PIN');
  }
}
document.getElementById('pinInput').addEventListener('keypress', e=>{
  if(e.key === 'Enter') checkPin();
});

function switchDashTab(name, btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('sec-'+name).classList.add('active');
}

async function loadOrders(){
  try{
    const r = await fetch('/api/orders');
    _orders = await r.json();
    renderOrders();
    updateStats();
  }catch(e){
    document.getElementById('ordersList').innerHTML = '<div class="empty-state">Failed to load orders</div>';
  }
}

function updateStats(){
  const list = Object.values(_orders||{});
  document.getElementById('statTotal').textContent = list.length;
  document.getElementById('statPending').textContent = list.filter(o=>o.status==='pending').length;
  const weekAgo = Date.now() - 7*24*60*60*1000;
  document.getElementById('statWeek').textContent = list.filter(o=>o.ts > weekAgo).length;
}

function renderOrders(){
  const el = document.getElementById('ordersList');
  const entries = Object.entries(_orders||{}).sort((a,b)=>b[1].ts - a[1].ts);
  if(!entries.length){
    el.innerHTML = '<div class="empty-state">No orders yet</div>';
    return;
  }
  el.innerHTML = entries.map(([key,o])=>`
    <div class="order-card">
      <div class="order-top">
        <div>
          <div class="order-no">${o.orderNo}</div>
          <div class="order-name">${o.name}</div>
        </div>
        <span class="status-badge status-${o.status}">${o.status}</span>
      </div>
      <div class="order-detail">
        <b>${o.occasion}</b> · ${o.size}<br>
        Flavor: ${o.flavor}<br>
        Delivery: ${o.date} to ${o.address}<br>
        Contact: ${o.contact}<br>
        Payment: ${o.payment}
        ${o.notes ? '<br>Notes: '+o.notes : ''}
      </div>
      <select class="status-select" onchange="updateOrderStatus('${key}', this.value)">
        <option value="pending" ${o.status==='pending'?'selected':''}>Pending</option>
        <option value="confirmed" ${o.status==='confirmed'?'selected':''}>Confirmed</option>
        <option value="baking" ${o.status==='baking'?'selected':''}>Baking</option>
        <option value="ready" ${o.status==='ready'?'selected':''}>Ready for Delivery</option>
        <option value="delivered" ${o.status==='delivered'?'selected':''}>Delivered</option>
      </select>
    </div>
  `).join('');
}

async function updateOrderStatus(key, status){
  try{
    await fetch('/api/orders', {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({key, status})
    });
    if(_orders[key]) _orders[key].status = status;
    updateStats();
    toast('Status updated');
  }catch(e){
    toast('Failed to update','err');
  }
}

async function loadGallery(){
  try{
    const r = await fetch('/api/gallery');
    _gallery = await r.json();
    renderGallery();
  }catch(e){}
}

function renderGallery(){
  const el = document.getElementById('galleryGridDash');
  const entries = Object.entries(_gallery||{});
  if(!entries.length){
    el.innerHTML = '<div class="empty-state" style="grid-column:1/-1">No photos yet</div>';
    return;
  }
  el.innerHTML = entries.map(([key,g])=>`
    <div class="gallery-item">
      <img src="${g.photo}">
    </div>
  `).join('');
}

function compressImage(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ev=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = h*(maxDim/w); w = maxDim; }
        else if(h > maxDim){ w = w*(maxDim/h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadGalleryPhoto(e){
  const file = e.target.files[0];
  if(!file) return;
  toast('Compressing photo...');
  try{
    const photo = await compressImage(file, 1000, 0.75);
    await fetch('/api/gallery', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({photo, ts: Date.now()})
    });
    toast('📷 Photo added to gallery');
    loadGallery();
  }catch(err){
    toast('Upload failed','err');
  }
}
</script>
</body>
</html>
